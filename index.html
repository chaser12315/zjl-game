        function extractChineseChars(text) {
            const chars = [];
            for (let ch of text) if (/[\u4e00-\u9fff]/.test(ch)) chars.push(ch);
            return chars;
        }

        function selectHiddenIndices(chars, ratio = 0.16) {
            const total = chars.length;
            if (!total) return new Set();
            const visibleCount = Math.max(1, Math.floor(total * ratio));
            const indices = Array.from({length: total}, (_, i) => i);
            for (let i = indices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [indices[i], indices[j]] = [indices[j], indices[i]];
            }
            const visibleSet = new Set(indices.slice(0, visibleCount));
            const hidden = new Set();
            for (let i = 0; i < total; i++) if (!visibleSet.has(i)) hidden.add(i);
            return hidden;
        }

        function renderLyrics(original, chars, hiddenSet) {
            let idx = 0, html = '';
            for (let ch of original) {
                if (/[\u4e00-\u9fff]/.test(ch)) {
                    html += hiddenSet.has(idx) ? `<span class="hidden-char">＿</span>` : `<span class="visible-char">${ch}</span>`;
                    idx++;
                } else {
                    if (ch === '\n') html += '<br>';
                    else if (ch === ' ') html += ' ';
                    else html += ch;
                }
            }
            return html;
        }

            pureChars = extractChineseChars(currentLyrics);
            hiddenIndices = selectHiddenIndices(pureChars);
            lyricsBox.innerHTML = renderLyrics(currentLyrics, pureChars, hiddenIndices);
            hintArea.innerHTML = `💡 提示：歌名 <strong>${song.title.length}</strong> 个字`;
            guessInput.value = '';
            messageBox.innerHTML = '';
            currentSongHints = 0;
            progressDisplay.textContent = `第 ${currentRoundIndex+1}/${ROUND_SIZE} 首`;
            roundScoreDisplay.textContent = `${roundScore}/100`;
            guessInput.focus();
        }

        function finishCurrentSong(earnedPoints) {
            roundScore = Math.min(100, Math.max(0, roundScore + earnedPoints));
            roundScoreDisplay.textContent = `${roundScore}/100`;
            if (currentRoundIndex === ROUND_SIZE - 1) {
                showRoundSummary();
            } else {
                currentRoundIndex++;
                updateUIForSong();
            }
        }

        function useHintAction() {
            const hiddenArr = Array.from(hiddenIndices);
            if (hiddenArr.length === 0) {
                messageBox.innerHTML = '字已全显示，猜出来吧！';
                return;
            }
            const revealCount = Math.max(1, Math.floor(pureChars.length * 0.15));
            const shuffled = [...hiddenArr].sort(() => Math.random() - 0.5);
            const toReveal = shuffled.slice(0, revealCount);
            for (let idx of toReveal) hiddenIndices.delete(idx);
            currentSongHints++;
            lyricsBox.innerHTML = renderLyrics(currentLyrics, pureChars, hiddenIndices);
            hintArea.innerHTML = `✨ 已用 ${currentSongHints} 次提示 (-${currentSongHints*2}分) 剩余隐藏 ${hiddenIndices.size}`;
            messageBox.innerHTML = `提示：揭示了 ${toReveal.length} 个字（本题累计扣 ${currentSongHints*2} 分）`;
        }

        function checkAnswer(guess) {
            const song = currentRoundSongs[currentRoundIndex];
            const normalize = s => s.replace(/\s+/g, '').toLowerCase().trim();
            const u = normalize(guess), t = normalize(song.title);
            if (u === t || t.includes(u) || u.includes(t)) return true;
            return song.title.replace(/[^\u4e00-\u9fff]/g, '') === guess.replace(/[^\u4e00-\u9fff]/g, '');
        }

        function submitGuess() {
            const guess = guessInput.value.trim();
            if (!guess) { messageBox.innerHTML = '请输入歌名～'; return; }
            if (checkAnswer(guess)) {
                const songScore = Math.max(0, 20 - currentSongHints * 2);
                messageBox.innerHTML = `🎉 正确！ +${songScore} 分 (扣了 ${currentSongHints*2} 分提示)`;
                finishCurrentSong(songScore);
            } else {
                messageBox.innerHTML = '❌ 不对哦，再想想～';
                guessInput.value = '';
                guessInput.focus();
            }
        }

        function skipSong() {
            const title = currentRoundSongs[currentRoundIndex].title;
            messageBox.innerHTML = `⏭️ 跳过。答案是《${title}》，本题0分。`;
            finishCurrentSong(0);
        }

        function showRoundSummary() {
            let html = `<div class="summary-overlay" id="summaryOverlay"><div class="summary-box">
                <h2>🎵 本轮结束</h2>
                <div class="summary-score">得分：${roundScore} / 100</div>`;
            currentRoundSongs.forEach(song => {
                html += `<div class="summary-song"><strong>${song.title}</strong><br><small style="color:#bbb;">${song.lyrics.substring(0,60)}...</small></div>`;
            });
            html += `<p style="margin-top:1rem; color:#aaa;">2秒后开始新一轮...</p></div></div>`;
            document.body.insertAdjacentHTML('beforeend', html);
            setTimeout(() => {
                const overlay = document.getElementById('summaryOverlay');
                if (overlay) overlay.remove();
                startNewRound();
            }, 2000);
        }

        function startNewRound() {
            const shuffled = [...songs].sort(() => Math.random() - 0.5);
            currentRoundSongs = shuffled.slice(0, ROUND_SIZE);
            currentRoundIndex = 0;
            roundScore = 0;
            roundScoreDisplay.textContent = '0/100';
            updateUIForSong();
        }

        submitBtn.addEventListener('click', submitGuess);
        guessInput.addEventListener('keypress', e => { if (e.key === 'Enter') submitGuess(); });
        hintBtn.addEventListener('click', useHintAction);
        skipBtn.addEventListener('click', skipSong);

        startNewRound();
    })();
</script>
</body>
</html>
